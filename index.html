<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shikigami</title>
    <!-- Live2D Cubism 4 Core runtime. Async so a slow CDN never blocks the
         React root render. Live2DRenderer waits for window.Live2DCubismCore
         at model-load time. -->
    <script async src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        /* DIAG MODE: solid red so a rendered-but-content-broken window is
           instantly visible. Revert after diagnosing. */
        background: #881133 !important;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        cursor: default;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }
      body::before {
        content: "DIAG · HTML root loaded · if you see this, WebView is alive";
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%,-50%);
        padding: 12px 16px;
        background: rgba(0,0,0,0.45);
        border-radius: 8px;
        font-size: 12px;
        z-index: 1;
      }
      ::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
