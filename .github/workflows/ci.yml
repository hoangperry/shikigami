name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential \
            curl \
            wget \
            file

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      # Tauri's `generate_context!()` proc-macro reads `frontendDist`
      # ("../dist") at compile time and panics if the path doesn't exist.
      # Cheap stub keeps the macro happy without running the full Vite
      # build for clippy / tests. Cross-platform via shell built-ins
      # (Windows runners use Git Bash for `run:` blocks by default, so
      # `mkdir -p` + redirection both work — no `if: runner.os` split).
      - name: Stub frontend dist for tauri::generate_context!
        shell: bash
        run: |
          mkdir -p dist
          echo '<!doctype html><title>stub</title>' > dist/index.html

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib --all-features

      - name: cargo check (release profile)
        working-directory: src-tauri
        run: cargo check --release

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  schemas:
    name: Schemas + character manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validators
        run: pip install jsonschema pillow

      - name: Validate schemas parse as JSON
        run: |
          python - <<'PY'
          import json, sys, pathlib
          for p in pathlib.Path("schemas").glob("*.json"):
              data = json.loads(p.read_text())
              print(f"✓ {p} ({data.get('title','<no-title>')})")
          PY

      - name: Validate linh-pixel manifest against schema
        run: |
          python - <<'PY'
          import json, pathlib, sys, jsonschema
          schema = json.loads(pathlib.Path("schemas/manifest.v1.0.json").read_text())
          manifest = json.loads(pathlib.Path("characters/linh-pixel/manifest.json").read_text())
          try:
              jsonschema.validate(manifest, schema)
              print("✓ characters/linh-pixel/manifest.json validates")
          except jsonschema.ValidationError as e:
              print(f"✗ validation failed: {e.message}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Regenerate linh-pixel frames (smoke check)
        run: |
          # generate.py is reproducible at the *pixel* level but produces
          # PNG byte-output that varies with libpng / zlib / Pillow
          # versions across machines (different deflate parameters).
          # Asserting byte-for-byte equality fails on minor toolchain
          # bumps; instead we check that every expected output exists
          # and is non-empty after regeneration.
          cd characters/linh-pixel
          python3 src/generate.py
          missing=0
          for state in idle happy happy_relieved focused warning sleepy; do
            for n in 00 01; do
              f="assets/states/$state/frame_$n.png"
              if [[ ! -s "$f" ]]; then
                echo "✗ missing or empty: $f"
                missing=$((missing+1))
              fi
            done
          done
          if [[ -s preview.png ]]; then
            echo "✓ preview.png present"
          else
            echo "✗ preview.png missing"; missing=$((missing+1))
          fi
          if [[ "$missing" -gt 0 ]]; then exit 1; fi
          echo "✓ all 13 frames + preview regenerated successfully"

  hook:
    name: Hook bridge smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Transform simulation (claude-code source)
        run: |
          set -e
          # tool_start
          echo '{"hook_event_name":"PreToolUse","tool_name":"Bash","tool_input":{"command":"ls"}}' \
            | SHIKIGAMI_DEBUG=1 python3 hooks/shikigami-hook.py || true

          # destructive detection
          out=$(echo '{"hook_event_name":"PreToolUse","tool_name":"Bash","tool_input":{"command":"rm -rf /tmp/foo"}}' \
            | SHIKIGAMI_DEBUG=1 python3 hooks/shikigami-hook.py 2>&1 || true)
          echo "$out"

      - name: Transform simulation (codex source)
        run: |
          set -e
          # Codex CLI uses identical event names + payload shape, so the
          # only thing that should differ in the resulting EventPayload
          # is the `source` field. Smoke-test the --source flag end-to-end.
          echo '{"hook_event_name":"PreToolUse","tool_name":"Bash","tool_input":{"command":"ls"}}' \
            | SHIKIGAMI_DEBUG=1 python3 hooks/shikigami-hook.py --source codex || true

          # Codex-only PermissionRequest event maps to a warning-severity
          # event so Hiyori signals "agent waiting on you".
          echo '{"hook_event_name":"PermissionRequest","tool_name":"Bash","message":"allow rm?"}' \
            | SHIKIGAMI_DEBUG=1 python3 hooks/shikigami-hook.py --source codex || true

      - name: Transform simulation (cursor source)
        run: |
          set -e
          # Cursor uses camelCase event names + conversation_id /
          # workspace_roots field aliases; normalize_cursor() rewrites
          # them onto the Claude shape before the transform runs. We
          # smoke-test the 5-event minimal scope from the v0.4 debate
          # (sessionStart / preToolUse / postToolUse / postToolUseFailure
          # / stop) plus an unknown event to confirm it's silently
          # skipped instead of erroring.
          echo '{"hook_event_name":"preToolUse","tool_name":"Bash","tool_input":{"command":"ls"},"conversation_id":"c","workspace_roots":["/tmp"]}' \
            | SHIKIGAMI_DEBUG=1 python3 hooks/shikigami-hook.py --source cursor || true

          echo '{"hook_event_name":"postToolUseFailure","tool_name":"Bash","tool_response":{}}' \
            | SHIKIGAMI_DEBUG=1 python3 hooks/shikigami-hook.py --source cursor || true

          # Unknown Cursor event (one of the 13+ outside the minimal
          # scope) — should be a silent no-op, not an error.
          echo '{"hook_event_name":"afterMCPExecution"}' \
            | SHIKIGAMI_DEBUG=1 python3 hooks/shikigami-hook.py --source cursor || true

      - name: install-hook syntax check
        run: python3 -c "import ast; ast.parse(open('scripts/install-hook.py').read())"

      - name: install-hook doctor (noop on CI — just ensures no import errors)
        run: python3 scripts/install-hook.py status || true
