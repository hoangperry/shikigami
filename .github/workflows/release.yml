name: Release

# Triggered by pushing a `v*` tag (e.g. `v0.1.0-alpha.0`). Builds the
# macOS DMG and attaches it to a GitHub Release. Code signing is
# best-effort: when the `APPLE_SIGNING_IDENTITY` secret + Keychain
# certificate are configured the bundle is signed; otherwise an
# unsigned DMG is uploaded with a one-line install note in the release
# body.
#
# Notarization (Path B in the README) requires a paid Apple Developer
# Program enrolment and additional secrets — see the commented block
# at the bottom of the build step for the env vars Tauri reads.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # manual trigger from the Actions tab

permissions:
  contents: write # needed to create the GitHub Release + upload assets

jobs:
  macos-dmg:
    name: macOS DMG (aarch64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # Optional code-sign step: only runs when an APPLE_CERTIFICATE
      # secret is provided (base64 .p12). Without it we still build a
      # working unsigned DMG that end users can install via the xattr
      # workaround documented in README.md.
      - name: Import Apple signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode the cert + import to a fresh build keychain.
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12

      - name: Build signed DMG
        env:
          # Tauri reads these for code-signing + notarization. All are
          # optional — missing values produce an unsigned-but-bundled DMG.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri:build

      - name: Locate artifacts
        id: artifacts
        run: |
          DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          APP_TGZ_NAME=$(basename "$DMG" .dmg).app.tar.gz
          tar -C src-tauri/target/release/bundle/macos -czf "$APP_TGZ_NAME" Shikigami.app
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "app_tgz=$APP_TGZ_NAME" >> "$GITHUB_OUTPUT"

      - name: Compute checksums
        run: |
          shasum -a 256 \
            "${{ steps.artifacts.outputs.dmg }}" \
            "${{ steps.artifacts.outputs.app_tgz }}" \
            > SHA256SUMS.txt

      - name: Create GitHub Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true # human approves before going public
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.app_tgz }}
            SHA256SUMS.txt
          body: |
            ## macOS install

            1. Download `Shikigami_*.dmg` (or the `.app.tar.gz` if you prefer).
            2. Drag `Shikigami.app` into `/Applications`.
            3. First launch needs a Gatekeeper bypass — pick one:
               - **Settings:** *System Settings → Privacy & Security → "Open Anyway"*
               - **Terminal:** `xattr -cr /Applications/Shikigami.app && open /Applications/Shikigami.app`

            Verified checksums in `SHA256SUMS.txt`.

            See the full README for hook installation + character setup.

  windows-msi:
    # Builds `.msi` (WiX) + `.exe` (NSIS) for x64 Windows.
    # Code-signing is opt-in via the WINDOWS_CERTIFICATE secret — when
    # absent we ship an unsigned binary (alpha-acceptable; SmartScreen
    # warning per the README). When present, the import step below
    # provisions the cert and Tauri's bundler invokes signtool. See
    # docs/WINDOWS-SIGNING.md for the full procurement + setup runbook.
    name: Windows MSI (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # Optional Windows code-sign step: only runs when the EV cert
      # secrets are present. Without them the build still produces a
      # functional (but unsigned) installer + SmartScreen warning. See
      # docs/WINDOWS-SIGNING.md for the full procurement + setup runbook.
      - name: Import Windows signing certificate
        if: env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          # Decode the base64 .pfx blob from the secret to a temp file,
          # import it into the runner's CurrentUser cert store. signtool
          # picks it up by thumbprint at bundle time. The thumbprint is
          # written to GITHUB_ENV so the next step can pass it to Tauri.
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $pfx = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($pfx, $bytes)
          $sec = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $sec
          Remove-Item $pfx -Force
          "WINDOWS_CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -Append $env:GITHUB_ENV
          Write-Host "Imported cert thumbprint: $($cert.Thumbprint)"

      - name: Build MSI + NSIS bundles
        # Tauri picks the right targets per platform from `tauri.conf.json`
        # `bundle.targets` — on Windows that's `msi` + `nsis`. When the
        # signing env vars below are populated Tauri auto-invokes
        # signtool with the imported cert; otherwise it produces unsigned
        # but functional artifacts.
        env:
          # Tauri reads TAURI_SIGNING_PRIVATE_KEY for app updater signing
          # (separate from code-signing) — left null intentionally.
          # For code-signing, Tauri reads bundle.windows.certificateThumbprint
          # from tauri.conf.json. Override via this env var when we have
          # one without committing it to source.
          TAURI_BUNDLE_WINDOWS_CERTIFICATE_THUMBPRINT: ${{ env.WINDOWS_CERT_THUMBPRINT }}
          TAURI_BUNDLE_WINDOWS_TIMESTAMP_URL: http://timestamp.digicert.com
        run: pnpm tauri:build

      - name: Locate artifacts
        id: artifacts
        shell: bash
        run: |
          MSI=$(ls src-tauri/target/release/bundle/msi/*.msi | head -1)
          NSIS=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1)
          echo "msi=$MSI" >> "$GITHUB_OUTPUT"
          echo "nsis=$NSIS" >> "$GITHUB_OUTPUT"

      - name: Compute checksums
        shell: bash
        run: |
          sha256sum \
            "${{ steps.artifacts.outputs.msi }}" \
            "${{ steps.artifacts.outputs.nsis }}" \
            > SHA256SUMS-windows.txt

      - name: Upload Windows assets to existing draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false
          files: |
            ${{ steps.artifacts.outputs.msi }}
            ${{ steps.artifacts.outputs.nsis }}
            SHA256SUMS-windows.txt
          append_body: true
          body: |

            ---

            ## Windows install (alpha — unsigned)

            Pick either installer:
            - `Shikigami_*_x64_en-US.msi` — WiX-based, system-wide install
            - `Shikigami_*_x64-setup.exe` — NSIS-based, per-user install (no admin needed)

            **First launch:** SmartScreen will warn because the binary is
            not yet code-signed. Click *More info → Run anyway*.

            Hook setup uses the same `scripts/install-hook.py` flow as
            macOS — `python scripts\install-hook.py install`. The
            installer registers `hooks\shikigami-hook.ps1` as the
            Claude Code hook command on Windows.

            Checksums in `SHA256SUMS-windows.txt`.

  linux-bundle:
    # Builds .deb / .rpm / .AppImage on ubuntu-latest. No code-signing
    # equivalent on Linux at the distro level — distros rely on package
    # manager + repo trust instead. AppImage authors sometimes sign with
    # gpg / zsync; we skip both for the alpha milestone.
    name: Linux bundles (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      # GTK + WebKit2GTK are runtime + build deps. libfuse2 is needed
      # for AppImage assembly. rpm is needed because Tauri shells out to
      # `rpmbuild` for .rpm; it isn't on ubuntu-latest by default.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libfuse2 \
            rpm \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build .deb / .rpm / .AppImage
        # Tauri picks the Linux subset of bundle.targets — deb, rpm,
        # appimage. None require signing infrastructure.
        run: pnpm tauri:build

      - name: Locate artifacts
        id: artifacts
        run: |
          DEB=$(ls src-tauri/target/release/bundle/deb/*.deb | head -1)
          RPM=$(ls src-tauri/target/release/bundle/rpm/*.rpm | head -1)
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          echo "deb=$DEB" >> "$GITHUB_OUTPUT"
          echo "rpm=$RPM" >> "$GITHUB_OUTPUT"
          echo "appimage=$APPIMAGE" >> "$GITHUB_OUTPUT"

      - name: Compute checksums
        run: |
          sha256sum \
            "${{ steps.artifacts.outputs.deb }}" \
            "${{ steps.artifacts.outputs.rpm }}" \
            "${{ steps.artifacts.outputs.appimage }}" \
            > SHA256SUMS-linux.txt

      - name: Upload Linux assets to existing draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false
          files: |
            ${{ steps.artifacts.outputs.deb }}
            ${{ steps.artifacts.outputs.rpm }}
            ${{ steps.artifacts.outputs.appimage }}
            SHA256SUMS-linux.txt
          append_body: true
          body: |

            ---

            ## Linux install (alpha — Wayland transparency unverified)

            Pick the format your distro prefers:
            - `shikigami_*_amd64.deb` — Debian / Ubuntu (`sudo dpkg -i shikigami_*.deb && sudo apt-get install -f`)
            - `shikigami-*.x86_64.rpm` — Fedora / RHEL / openSUSE (`sudo rpm -i shikigami-*.rpm`)
            - `shikigami_*_amd64.AppImage` — distro-agnostic (`chmod +x shikigami_*.AppImage && ./shikigami_*.AppImage`)

            Hook setup is identical to macOS: `python3 scripts/install-hook.py install`.

            ⚠️ **Known gaps in the v0.1 alpha Linux build:**
            - Transparent always-on-top overlay is **untested on real
              Linux desktops**. X11 with a compositor (Xfwm, Mutter, KWin)
              is expected to work; **Wayland needs verification** — some
              compositors (older GNOME) lack the protocols Tauri relies on.
            - `alwaysOnTop` semantics differ between WM/compositors; may
              fall back to "above" hint instead of true topmost.
            - Click-through (`set_ignore_cursor_events`) requires the
              compositor to honour input shapes. Untested.

            Checksums in `SHA256SUMS-linux.txt`.
